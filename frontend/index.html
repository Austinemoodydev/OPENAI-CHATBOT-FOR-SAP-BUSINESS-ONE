<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Crown Paints SAP AI Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      SAP Business One AI Assistant — Crown Paints
    </div>

    <div id="chatBox" class="card-body chat-box"></div>

    <div class="card-footer d-flex">
      <input id="messageInput" class="form-control me-2" placeholder="Ask about customers, stock, invoices...">
      <button onclick="sendMessage()" class="btn btn-primary">Send</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
